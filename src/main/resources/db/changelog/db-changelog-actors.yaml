databaseChangeLog:
  - changeSet:
       id: create-actors-table
       author: user
       changes:
          - createTable:
              tableName: actors
              columns:
               - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: true

               - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: true

               - column:
                  name: country_id
                  type: bigint
                  constraints:
                    nullable: true
                    foreignKeyName: fk_actors_countries
                    referencedTableName: countries
                    referencedColumnNames: id